<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Expenses chart</title>
  </head>
  <body>
    <main class="wrapper">
      <!-- header Section-->
      <header class="balance-card">
        <div class="balance-content">
          <span class="balance-label">My balance</span>
          <span class="balance-amount">$921.48</span>
        </div>
        <img
          class="balance-icon"
          src="images/logo.svg"
          alt=""
          role="presentation"
        />
      </header>
      <!-- Chart Section -->
      <figure
        class="chart"
        aria-labelledby="chart-title"
        aria-describedby="chart-desc"
      >
        <figcaption id="chart-title" class="chart-title">
          Spending - Last 7 days
        </figcaption>
        <p id="chart-desc" class="visually-hidden">
          Bar chart showing daily spending for the last 7 days. Each bar
          represents one day's total spending amount.
        </p>
        <ul class="bars"></ul>
        <div class="chart-total">
          <div class="total-desc">Total this month</div>
          <div class="total-amount">$478.33</div>
          <div class="total-percent">
            <span class="percent-increase">+2.4%</span>
            <span>from last month</span>
          </div>
        </div>
      </figure>
    </main>

    <script src="main.js"></script>
  </body>
</html>
